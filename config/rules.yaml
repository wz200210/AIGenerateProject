# ==================== 监控/可观测性 ====================
monitoring_tools:
  - name: "MLflow"
    id: "mlflow"
    type: "monitoring"
    severity: "low"
    description: "ML 生命周期管理"
    
    process_patterns:
      - "mlflow.*server"
      - "mlflow.*ui"
    
    default_ports:
      - 5000
      - 5001
    
    http_endpoints:
      - path: "/"
        method: "GET"

  - name: "Weights & Biases"
    id: "wandb"
    type: "monitoring"
    severity: "low"
    description: "实验跟踪平台"
    
    process_patterns:
      - "wandb.*server"
      - "wandb.*local"
    
    env_indicators:
      - "WANDB_API_KEY"
      - "WANDB_BASE_URL"

  - name: "LangSmith"
    id: "langsmith"
    type: "monitoring"
    severity: "low"
    description: "LangChain 应用监控"
    
    process_patterns:
      - "langsmith"
    
    env_indicators:
      - "LANGCHAIN_API_KEY"
      - "LANGSMITH_API_KEY"

  - name: "Langfuse"
    id: "langfuse"
    type: "monitoring"
    severity: "low"
    description: "LLM 可观测性"
    
    process_patterns:
      - "langfuse"
    
    env_indicators:
      - "LANGFUSE_API_KEY"
      - "LANGFUSE_HOST"

  - name: "Jupyter"
    id: "jupyter"
    type: "monitoring"
    severity: "low"
    description: "交互式开发环境"
    
    process_patterns:
      - "jupyter.*notebook"
      - "jupyter.*lab"
      - "jupyter.*server"
      - "ipython"
    
    default_ports:
      - 8888

