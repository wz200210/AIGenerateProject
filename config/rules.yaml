# ==================== 全局配置 ====================
global:
  # 扫描配置
  scan:
    timeout: 30s
    max_processes: 10000
    
  # 版本探测配置
  version_probe:
    timeout: 5s
    retry_count: 2
    
  # HTTP 探测配置
  http_probe:
    timeout: 2s
    user_agent: "AIComponentScanner/0.3.0"
    
  # 置信度计算权重
  confidence_weights:
    process_name_match: 0.2
    has_listening_port: 0.15
    has_api_env_var: 0.05
    long_uptime: 0.1
    parent_is_ai: 0.1